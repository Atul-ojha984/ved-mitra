services:
  - type: web
    name: ved-mitra-backend
    runtime: docker
    buildCommand: "composer install --no-dev --optimize-autoloader && npm ci && npm run build"
    startCommand: "php artisan serve --host=0.0.0.0 --port=$PORT"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database

  - type: pgsql
    name: ved-mitra-db
    ipAllowList: [] # Only accessible by the web service

databases:
  - name: ved-mitra-db
    databaseName: vedmitra
    user: vedmitra